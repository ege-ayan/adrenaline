name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.2)"
        required: true
        default: "v0.1.2"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CRATE_NAME: adrenaline
  BIN_NAME: adrenaline

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            slug: linux-x86_64
            label: Linux x86_64
            archive: tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            slug: linux-aarch64
            label: Linux ARM64
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            slug: macos-aarch64
            label: macOS Apple Silicon
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            slug: macos-x86_64
            label: macOS Intel
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            slug: windows-x86_64
            label: Windows x86_64
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.slug }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            version="${GITHUB_REF#refs/tags/v}"
          else
            version="${{ github.event.inputs.tag }}"
            version="${version#v}"
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.value }}"
          slug="${{ matrix.slug }}"
          target="${{ matrix.target }}"
          stem="${CRATE_NAME}-${version}-${slug}"
          bin="target/${target}/release/${BIN_NAME}"

          test -f "${bin}" || { echo "missing binary: ${bin}"; exit 1; }

          mkdir -p "dist/${stem}"
          cp "${bin}" "dist/${stem}/${BIN_NAME}"
          chmod +x "dist/${stem}/${BIN_NAME}"
          tar -czf "dist/${stem}.tar.gz" -C dist "${stem}"
          ls -lh "dist/${stem}.tar.gz"
          echo "ASSET=dist/${stem}.tar.gz" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = "${{ steps.version.outputs.value }}"
          $slug = "${{ matrix.slug }}"
          $target = "${{ matrix.target }}"
          $stem = "$env:CRATE_NAME-$version-$slug"
          $bin = "target/$target/release/$env:BIN_NAME.exe"

          if (-not (Test-Path $bin)) {
            throw "missing binary: $bin"
          }

          New-Item -ItemType Directory -Force -Path "dist/$stem" | Out-Null
          Copy-Item $bin "dist/$stem/$env:BIN_NAME.exe"
          Compress-Archive -Path "dist/$stem" -DestinationPath "dist/$stem.zip" -Force
          Get-Item "dist/$stem.zip"
          echo "ASSET=dist/$stem.zip" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.slug }}
          path: ${{ env.ASSET }}

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: find dist -type f -ls

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            tag="${GITHUB_REF#refs/tags/}"
          else
            tag="${{ github.event.inputs.tag }}"
          fi
          echo "value=$tag" >> "$GITHUB_OUTPUT"

      - name: Generate checksums
        run: |
          cd dist
          shasum -a 256 *.tar.gz *.zip > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: ${{ steps.tag.outputs.value }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
